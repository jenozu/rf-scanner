# Simple HTTP-only nginx config for RF Scanner
# Use this to get the app running quickly over the VM's IP address.
# You can switch to nginx-config-complete.conf later once you set up
# a domain name and HTTPS (Let's Encrypt).

server {
    listen 80;
    server_name _;

    root /var/www/rf-scanner;
    index index.html;

    # MIME type configuration for JavaScript modules
    location ~* \.js$ {
        add_header Content-Type application/javascript;
    }

    # Proxy API requests to Node.js backend
    # IMPORTANT: This must come BEFORE the location / block
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files, and fallback to index.html for client-side routing (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve /data/ directory with autoindex for file listing
    location /data/ {
        alias /var/www/rf-scanner/data/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    client_max_body_size 20M;

    access_log /var/log/nginx/rf-scanner.access.log;
    error_log /var/log/nginx/rf-scanner.error.log;
}
