# HTTPS nginx config for RF Scanner using a free sslip.io hostname
# (no domain purchase needed - sslip.io auto-resolves to your server's IP)
#
# Certbot will rewrite the "listen 443 ssl" block automatically when you
# run it with --nginx, so this file is a starting point before that step.

server {
    listen 80;
    server_name 34-24-171-56.sslip.io;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 34-24-171-56.sslip.io;

    root /var/www/rf-scanner;
    index index.html;

    location ~* \.js$ {
        add_header Content-Type application/javascript;
    }

    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /data/ {
        alias /var/www/rf-scanner/data/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    client_max_body_size 20M;

    access_log /var/log/nginx/rf-scanner.access.log;
    error_log /var/log/nginx/rf-scanner.error.log;
}
